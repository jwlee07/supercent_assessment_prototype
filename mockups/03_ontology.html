<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperSuit AI — 온톨로지</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">
<style>
  body { font-family: 'Noto Sans KR', sans-serif; margin: 0; }
  .sidebar { background: #1e1b4b; width: 240px; min-height: 100vh; }
  .nav-item { color: #c7d2fe; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .nav-item:hover { background: rgba(255,255,255,0.08); }
  .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
  #graph-container { height: calc(100vh - 140px); background: white; border-radius: 12px; border: 1px solid #e2e8f0; }
</style>
</head>
<body class="bg-slate-50 flex">

<!-- 사이드바 -->
<div class="sidebar flex flex-col p-4 fixed h-full">
  <div class="flex items-center gap-2 mb-8 mt-2">
    <span class="text-2xl">⚡</span>
    <span class="text-white font-bold text-lg leading-tight">SuperSuit AI</span>
  </div>
  <nav class="flex flex-col gap-1 flex-1">
    <div class="nav-item" onclick="location.href='01_game_list.html'">🎮 <span>게임 목록</span></div>
    <div class="nav-item active">🕸️ <span>온톨로지</span></div>
    <div class="nav-item" onclick="location.href='04_llm.html'">🤖 <span>LLM</span></div>
    <div class="nav-item" onclick="location.href='05_team.html'">👥 <span>팀 관리</span></div>
  </nav>
  <button onclick="location.href='06_upload.html'" class="bg-indigo-600 text-white rounded-lg py-2.5 px-4 text-sm font-medium hover:bg-indigo-700 transition">+ 업로드</button>
</div>

<!-- 메인 콘텐츠 -->
<div class="ml-60 flex-1 p-8">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold text-slate-800">온톨로지 그래프</h1>
    <div class="flex gap-3">
      <select class="border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-600 bg-white">
        <option>🎮 게임 전체</option>
        <option>Snake Clash!</option>
        <option>Dinosaur Universe</option>
      </select>
      <select class="border border-slate-200 rounded-lg px-3 py-2 text-sm text-slate-600 bg-white">
        <option>👥 팀 전체</option>
        <option>기획팀</option>
        <option>개발팀</option>
        <option>마케팅팀</option>
      </select>
    </div>
  </div>

  <div id="graph-container"></div>

  <!-- 범례 -->
  <div class="mt-3 flex gap-4 flex-wrap">
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-indigo-500"></div><span class="text-xs text-slate-500">게임</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-purple-500"></div><span class="text-xs text-slate-500">메카닉</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-amber-400"></div><span class="text-xs text-slate-500">가설</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-green-500"></div><span class="text-xs text-slate-500">결과</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-cyan-500"></div><span class="text-xs text-slate-500">지표</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-pink-500"></div><span class="text-xs text-slate-500">캠페인</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-orange-500"></div><span class="text-xs text-slate-500">경쟁게임</span></div>
    <div class="flex items-center gap-1.5"><div class="w-3 h-3 rounded-full bg-slate-400"></div><span class="text-xs text-slate-500">팀</span></div>
  </div>
</div>

<script>
const nodes = new vis.DataSet([
  // Games
  { id: 'g1', label: 'Snake Clash!', color: '#6366f1', size: 35, group: 'game' },
  { id: 'g2', label: 'Dinosaur Universe', color: '#6366f1', size: 35, group: 'game' },
  // Mechanics
  { id: 'm1', label: '뱀 이동 루프', color: '#8b5cf6', size: 22, group: 'mechanic' },
  { id: 'm2', label: '배틀로얄', color: '#8b5cf6', size: 20, group: 'mechanic' },
  { id: 'm3', label: '공룡 수집', color: '#8b5cf6', size: 20, group: 'mechanic' },
  { id: 'm4', label: 'FTUE', color: '#8b5cf6', size: 18, group: 'mechanic' },
  // Hypotheses
  { id: 'h1', label: '조작단순화\n→D1상승', color: '#f59e0b', size: 18, group: 'hypothesis' },
  { id: 'h2', label: 'FTUE단축\n→이탈감소', color: '#f59e0b', size: 18, group: 'hypothesis' },
  // Results
  { id: 'r1', label: 'D1 42%', color: '#22c55e', size: 18, group: 'result' },
  { id: 'r2', label: 'DAU +35%', color: '#22c55e', size: 18, group: 'result' },
  // Metrics
  { id: 'met1', label: 'D1=42%\nDAU=12000', color: '#06b6d4', size: 20, group: 'metric' },
  { id: 'met2', label: 'D1=38%\nDAU=8000', color: '#06b6d4', size: 20, group: 'metric' },
  // Campaigns
  { id: 'c1', label: 'Meta 캠페인\nCPI $0.8', color: '#ec4899', size: 18, group: 'campaign' },
  { id: 'c2', label: 'Google UAC\nCPI $1.1', color: '#ec4899', size: 18, group: 'campaign' },
  // Competitors
  { id: 'comp1', label: 'Snake.io', color: '#f97316', size: 18, group: 'competitor' },
  { id: 'comp2', label: 'AFK Arena', color: '#f97316', size: 18, group: 'competitor' },
  // Teams
  { id: 't1', label: '기획팀', color: '#64748b', size: 16, group: 'team' },
  { id: 't2', label: '마케팅팀', color: '#64748b', size: 16, group: 'team' },
  { id: 't3', label: '데이터팀', color: '#64748b', size: 16, group: 'team' },
]);

const edges = new vis.DataSet([
  { from: 'g1', to: 'm1' }, { from: 'g1', to: 'm2' },
  { from: 'g2', to: 'm3' }, { from: 'g2', to: 'm4' },
  { from: 'm1', to: 'h1' }, { from: 'm4', to: 'h2' },
  { from: 'h1', to: 'r1' }, { from: 'm2', to: 'r2' },
  { from: 'g1', to: 'met1' }, { from: 'g2', to: 'met2' },
  { from: 'g1', to: 'c1' }, { from: 'g2', to: 'c2' },
  { from: 'g1', to: 'comp1' }, { from: 'g2', to: 'comp2' },
  { from: 't1', to: 'g1' }, { from: 't1', to: 'g2' },
  { from: 't2', to: 'g1' }, { from: 't3', to: 'g2' },
]);

const container = document.getElementById('graph-container');
const options = {
  nodes: { shape: 'dot', font: { size: 12, multi: true }, borderWidth: 2 },
  edges: { arrows: { to: { enabled: true, scaleFactor: 0.4 } }, color: { color: '#cbd5e1' } },
  physics: { stabilization: { iterations: 200 }, barnesHut: { gravitationalConstant: -10000, springLength: 120 } }
};
new vis.Network(container, { nodes, edges }, options);
</script>
</body>
</html>
