<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SuperSuit AI — 업로드</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Noto Sans KR', sans-serif; }
  .sidebar { background: #1e1b4b; width: 240px; min-height: 100vh; }
  .nav-item { color: #c7d2fe; padding: 10px 20px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .nav-item:hover { background: rgba(255,255,255,0.08); }
  .nav-item.active { background: rgba(255,255,255,0.15); color: white; }
  .type-card { border: 2px solid #e2e8f0; border-radius: 12px; padding: 20px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .type-card:hover { border-color: #6366f1; background: #eef2ff; }
  .type-card.selected { border-color: #6366f1; background: #eef2ff; }
  .dropzone { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .dropzone:hover { border-color: #6366f1; background: #eef2ff; }
</style>
</head>
<body class="bg-slate-50 flex">

<!-- 사이드바 -->
<div class="sidebar flex flex-col p-4 fixed h-full">
  <div class="flex items-center gap-2 mb-8 mt-2">
    <span class="text-2xl">⚡</span>
    <span class="text-white font-bold text-lg leading-tight">SuperSuit AI</span>
  </div>
  <nav class="flex flex-col gap-1 flex-1">
    <div class="nav-item" onclick="location.href='01_game_list.html'">🎮 <span>게임 목록</span></div>
    <div class="nav-item" onclick="location.href='03_ontology.html'">🕸️ <span>온톨로지</span></div>
    <div class="nav-item" onclick="location.href='04_llm.html'">🤖 <span>LLM</span></div>
    <div class="nav-item" onclick="location.href='05_team.html'">👥 <span>팀 관리</span></div>
  </nav>
  <button class="bg-indigo-600 text-white rounded-lg py-2.5 px-4 text-sm font-medium hover:bg-indigo-700 transition active">+ 업로드</button>
</div>

<!-- 메인 콘텐츠 -->
<div class="ml-60 flex-1 p-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-8">새 데이터 업로드</h1>

  <div class="max-w-2xl">

    <!-- Step 1: 게임 선택 -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 mb-5">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-6 h-6 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-bold">1</div>
        <h2 class="font-semibold text-slate-700">게임 선택</h2>
      </div>
      <div class="flex flex-col gap-2">
        <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 cursor-pointer">
          <input type="radio" name="game" value="1" class="text-indigo-600">
          <span class="text-sm text-slate-700">🐍 Snake Clash!</span>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 cursor-pointer">
          <input type="radio" name="game" value="2" class="text-indigo-600">
          <span class="text-sm text-slate-700">🦕 Dinosaur Universe</span>
        </label>
        <label class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-50 cursor-pointer border-dashed border-2 border-slate-200">
          <input type="radio" name="game" value="new" class="text-indigo-600">
          <span class="text-sm text-slate-500">+ 새 게임 추가</span>
        </label>
      </div>
    </div>

    <!-- Step 2: 유형 선택 -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 mb-5">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-6 h-6 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-bold">2</div>
        <h2 class="font-semibold text-slate-700">데이터 유형 선택</h2>
      </div>
      <div class="grid grid-cols-5 gap-3">
        <div class="type-card selected" onclick="selectType(this, 'audio')">
          <div class="text-3xl mb-2">🎙️</div>
          <div class="text-xs font-medium text-slate-700">회의 음성</div>
        </div>
        <div class="type-card" onclick="selectType(this, 'metrics')">
          <div class="text-3xl mb-2">📊</div>
          <div class="text-xs font-medium text-slate-700">게임 지표</div>
        </div>
        <div class="type-card" onclick="selectType(this, 'marketing')">
          <div class="text-3xl mb-2">📣</div>
          <div class="text-xs font-medium text-slate-700">마케팅 성과</div>
        </div>
        <div class="type-card" onclick="selectType(this, 'research')">
          <div class="text-3xl mb-2">🔍</div>
          <div class="text-xs font-medium text-slate-700">경쟁 리서치</div>
        </div>
        <div class="type-card" onclick="selectType(this, 'abtest')">
          <div class="text-3xl mb-2">🧪</div>
          <div class="text-xs font-medium text-slate-700">A/B 테스트</div>
        </div>
      </div>
    </div>

    <!-- Step 3: 동적 폼 -->
    <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 mb-5">
      <div class="flex items-center gap-2 mb-4">
        <div class="w-6 h-6 bg-indigo-600 text-white rounded-full flex items-center justify-center text-xs font-bold">3</div>
        <h2 class="font-semibold text-slate-700">파일 업로드</h2>
      </div>

      <!-- 회의 음성 폼 -->
      <div id="form-audio">
        <div class="dropzone mb-4">
          <div class="text-4xl mb-2">🎙️</div>
          <p class="text-slate-500 text-sm">음성 파일을 드래그하거나 클릭해서 업로드</p>
          <p class="text-slate-400 text-xs mt-1">mp3, wav, m4a 지원 · 최대 100MB</p>
          <button class="mt-3 px-4 py-1.5 border border-indigo-300 text-indigo-600 rounded-lg text-sm hover:bg-indigo-50">파일 선택</button>
          <div class="flex items-center gap-2 mt-3">
            <div class="h-px bg-slate-200 flex-1"></div>
            <span class="text-xs text-slate-400">또는</span>
            <div class="h-px bg-slate-200 flex-1"></div>
          </div>
          <button class="mt-3 px-4 py-1.5 bg-red-50 border border-red-200 text-red-600 rounded-lg text-sm hover:bg-red-100 flex items-center gap-1.5 mx-auto">
            🔴 지금 녹음하기
          </button>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-medium text-slate-600 mb-1 block">회의 날짜</label>
            <input type="date" class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
          </div>
          <div>
            <label class="text-xs font-medium text-slate-600 mb-1 block">도메인</label>
            <select class="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm">
              <option>기획</option><option>마케팅</option><option>라이브옵스</option><option>데이터</option>
            </select>
          </div>
        </div>
        <div class="mt-4">
          <label class="text-xs font-medium text-slate-600 mb-1 block">참여 팀 (다중 선택)</label>
          <div class="flex gap-2 flex-wrap">
            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="text-indigo-600"><span class="text-sm text-slate-600">기획팀</span></label>
            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="text-indigo-600"><span class="text-sm text-slate-600">개발팀</span></label>
            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="text-indigo-600"><span class="text-sm text-slate-600">아트팀</span></label>
            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="text-indigo-600"><span class="text-sm text-slate-600">마케팅팀</span></label>
            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="text-indigo-600"><span class="text-sm text-slate-600">데이터팀</span></label>
          </div>
        </div>
      </div>

    </div>

    <!-- 업로드 버튼 -->
    <button onclick="startUpload()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-medium hover:bg-indigo-700 transition text-sm">
      업로드 시작 →
    </button>
  </div>
</div>

<!-- 처리 중 모달 -->
<div id="loading-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
    <div class="text-4xl mb-4">⚡</div>
    <h3 class="text-lg font-bold text-slate-800 mb-2">처리 중...</h3>
    <div class="flex flex-col gap-2 text-sm text-slate-500 mb-6">
      <div id="status-1" class="flex items-center gap-2"><span class="text-green-500">✅</span> CLOVA STT 변환 중...</div>
      <div id="status-2" class="flex items-center gap-2 opacity-40"><span>⏳</span> gpt-5.4-mini 엔티티 추출 중...</div>
      <div id="status-3" class="flex items-center gap-2 opacity-40"><span>⏳</span> 온톨로지 저장 중...</div>
      <div id="status-4" class="flex items-center gap-2 opacity-40"><span>⏳</span> 임베딩 생성 중...</div>
    </div>
    <div class="w-full bg-slate-100 rounded-full h-2">
      <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all" style="width: 25%"></div>
    </div>
  </div>
</div>

<script>
function selectType(el, type) {
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function startUpload() {
  const modal = document.getElementById('loading-modal');
  modal.classList.remove('hidden');

  const steps = [
    { id: 'status-1', progress: 25, delay: 0 },
    { id: 'status-2', progress: 50, delay: 1200 },
    { id: 'status-3', progress: 75, delay: 2400 },
    { id: 'status-4', progress: 100, delay: 3600 },
  ];

  steps.forEach(step => {
    setTimeout(() => {
      document.getElementById(step.id).classList.remove('opacity-40');
      document.getElementById(step.id).querySelector('span').textContent = '✅';
      document.getElementById(step.id).querySelector('span').className = 'text-green-500';
      document.getElementById('progress-bar').style.width = step.progress + '%';
    }, step.delay);
  });

  setTimeout(() => {
    modal.classList.add('hidden');
    alert('✅ 업로드 완료! 온톨로지가 업데이트되었습니다.\n(실제 구현에서는 온톨로지 화면으로 이동)');
    location.href = '03_ontology.html';
  }, 5000);
}
</script>
</body>
</html>
